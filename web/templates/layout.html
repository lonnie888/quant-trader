<!DOCTYPE html>
<html lang="zh" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quant Trader{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0b0e11', card: '#1e2329', border: '#2b3139', text: '#eaecef', muted: '#848e9c' },
                        green: '#0ecb81', red: '#f6465d', yellow: '#f0b90b',
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0b0e11; color: #eaecef; font-family: -apple-system, 'Segoe UI', sans-serif; }
        .card { background: #1e2329; border: 1px solid #2b3139; border-radius: 8px; padding: 20px; }
        .label { color: #848e9c; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 28px; font-weight: 700; }
        @media (max-width: 640px) {
            .value { font-size: 20px; }
            .card { padding: 12px; }
        }
        .green { color: #0ecb81; }
        .red { color: #f6465d; }
        .nav-link { color: #848e9c; padding: 8px 16px; border-radius: 6px; transition: all 0.15s; }
        .nav-link:hover { color: #eaecef; background: #1e2329; }
        .nav-link.active { color: #f0b90b; background: rgba(240,185,11,0.08); }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-wrap table { min-width: 600px; }
        @media (max-width: 640px) {
            .table-wrap table { min-width: 500px; }
        }
        table { width: 100%; border-collapse: collapse; }
        th { color: #848e9c; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid #2b3139; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #2b3139; font-size: 13px; white-space: nowrap; }
        @media (max-width: 640px) {
            th, td { padding: 8px 8px; font-size: 12px; }
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .btn { background: #2b3139; color: #eaecef; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
        .btn:hover { background: #3c4553; }
        .btn:disabled { opacity: 0.4; cursor: default; }
        input, select { background: #0b0e11; border: 1px solid #2b3139; border-radius: 4px; padding: 6px 10px; color: #eaecef; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #f0b90b; }
        @media (max-width: 640px) {
            input, select { font-size: 16px; } /* prevent iOS zoom */
            .mobile-stack { flex-direction: column !important; align-items: stretch !important; }
            .mobile-stack > div { width: 100% !important; }
            .mobile-stack .btn { margin-top: 0 !important; }
            .mobile-hide { display: none !important; }
            .mobile-show { display: block !important; }
            .nav-menu { display: none; flex-direction: column; width: 100%; padding: 8px 0; gap: 2px; }
            .nav-menu.open { display: flex; }
            .nav-toggle { display: block !important; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
            .nav-toggle:hover { background: #1e2329; }
        }
        @media (min-width: 641px) {
            .nav-menu { display: flex !important; }
            .nav-toggle { display: none !important; }
            .mobile-show { display: none !important; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e11; }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 3px; }
    </style>
</head>
<body class="h-full">
    <!-- 顶栏导航 -->
    <nav class="border-b border-[#2b3139] px-4 sm:px-6 py-3 flex items-center flex-wrap sticky top-0 z-50" style="background:#0b0e11;">
        <div class="flex items-center w-full sm:w-auto">
            <span class="text-lg font-bold mr-4 sm:mr-6" style="color:#f0b90b;">📊 QT</span>
            <span class="nav-toggle mobile-show text-xl ml-auto" id="nav-toggle" style="color:#848e9c;">☰</span>
        </div>
        <div class="nav-menu w-full sm:w-auto sm:flex sm:items-center sm:gap-1 mt-2 sm:mt-0" id="nav-menu">
            <a href="/" class="nav-link block sm:inline {{ 'active' if request.path == '/' else '' }}">总览</a>
            <a href="/positions" class="nav-link block sm:inline {{ 'active' if request.path == '/positions' else '' }}">持仓</a>
            <a href="/history" class="nav-link block sm:inline {{ 'active' if request.path == '/history' else '' }}">历史</a>
            <a href="/logout" class="nav-link block sm:inline ml-auto" style="color:#848e9c;">退出</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-4 sm:py-6">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
    <script>
        document.getElementById('nav-toggle')?.addEventListener('click', function() {
            document.getElementById('nav-menu').classList.toggle('open');
        });
    </script>
</body>
</html>
