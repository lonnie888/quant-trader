{% extends "layout.html" %}
{% block title %}K线 - Quant Trader{% endblock %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <h1 class="text-2xl font-bold">K 线图</h1>
    <span id="chart-symbol-label" style="color:#848e9c; font-size:14px;">—</span>
</div>

<div class="card" style="padding:0;">
    <div id="chart-container" style="height:500px; width:100%;"></div>
</div>

<div id="chart-info" class="mt-4" style="color:#848e9c; font-size:13px;"></div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/chart.js"></script>
{% endblock %}
